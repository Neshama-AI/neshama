# Quest Template: Betrayal Revenge
# NPC betrayal triggers revenge quest

template_id: betrayal_revenge
title: "复仇任务"
description: "NPC被背叛后委托玩家进行复仇。你会选择帮助他，还是劝他放下？"

giver_npc: ""  # Set dynamically

trigger:
  emotion: anger
  threshold: 0.6
  direction: any

completion_conditions:
  - condition_type: defeat_npc
    target: betrayer
    description: "击败背叛者"
  - condition_type: talk_to_npc
    target: betrayer
    description: "或者选择与背叛者和解"

rewards:
  - reward_type: reputation
    target: faction
    value: 20
  - reward_type: item
    target: revenge_token
    value: 1
  - reward_type: gold
    target: ""
    value: 100

emotional_success:
  - emotion: satisfaction
    value: 0.3
  - emotion: trust
    value: 0.1
  - emotion: relief
    value: 0.1

emotional_failure:
  - emotion: despair
    value: 0.2
  - emotion: anger
    value: 0.1
  - emotion: resentment
    value: 0.2

related_triggers:
  - betrayal_avenged
  - forgiveness_chosen
