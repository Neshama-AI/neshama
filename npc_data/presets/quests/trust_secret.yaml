# Quest Template: Trust Secret
# High trust unlocks secret quest

template_id: trust_secret
title: "秘密任务"
description: "NPC完全信任你后，向你透露了一个秘密任务。这个任务危险，但回报丰厚。"

giver_npc: ""  # Set dynamically

trigger:
  emotion: trust
  threshold: 0.7
  direction: any

completion_conditions:
  - condition_type: complete_task
    target: secret_task
    description: "完成NPC委托的秘密任务"
  - condition_type: talk_to_npc
    target: npc
    description: "向NPC汇报任务结果"

rewards:
  - reward_type: reputation
    target: secret_faction
    value: 30
  - reward_type: item
    target: secret_key
    value: 1
  - reward_type: gold
    target: ""
    value: 200

emotional_success:
  - emotion: trust
    value: 0.1
  - emotion: bond
    value: 0.2
  - emotion: anticipation
    value: 0.1

emotional_failure:
  - emotion: trust
    value: -0.3
  - emotion: betrayal
    value: 0.2
  - emotion: anger
    value: 0.2

related_triggers:
  - secret_unlocked
  - secret_quest_completed
  - betrayal_triggered
