# ============================================================
# Neshama Build & Release CI/CD Pipeline
# ============================================================
# This workflow builds platform-specific installers for
# Windows (.exe), macOS (.dmg), and Linux (AppImage).
#
# Triggers:
#   - Push tags matching v* (e.g., v1.0.0)
#   - Manual workflow dispatch
#
# Requirements:
#   - secrets.GITHUB_TOKEN (automatic)
#   - For releases: Upload to GitHub Releases
#
# ============================================================

name: Build & Release

on:
  # Trigger on version tags
  push:
    tags:
      - 'v*'
  # Allow manual trigger
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g., v1.0.0)'
        required: false
        type: string

env:
  PYTHON_VERSION: '3.11'
  NODE_VERSION: '18'

jobs:
  # =============================================
  # Build Windows Installer
  # =============================================
  build-windows:
    name: Build Windows (.exe)
    runs-on: windows-latest
    strategy:
      matrix:
        architecture: [x64]
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          architecture: ${{ matrix.architecture }}
      
      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~\AppData\Local\pip\Cache
          key: ${{ runner.os }}-py${{ env.PYTHON_VERSION }}-${{ hashFiles('**/pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-py${{ env.PYTHON_VERSION }}-
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[web]"
          pip install pyinstaller pywin32 pywin32-ctypes
      
      - name: Build with PyInstaller
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist
          pyinstaller --noconfirm --onedir `
            --name "Neshama" `
            --add-data "neshama/web/static;neshama/web/static" `
            --add-data "configs;configs" `
            --add-data "adapters;adapters" `
            --add-data "memory_data;memory_data" `
            --hidden-import=webview `
            --hidden-import=fastapi `
            --hidden-import=uvicorn `
            --hidden-import=pydantic `
            --hidden-import=yaml `
            --noconsole `
            neshama/web/launcher.py
      
      - name: Download Inno Setup
        shell: pwsh
        run: |
          $InnoSetupUrl = "https://jrsoftware.org/download.php/is.exe"
          Invoke-WebRequest -Uri $InnoSetupUrl -OutFile is_setup.exe
          Start-Process -Wait -FilePath .\is_setup.exe -ArgumentList "/VERYSILENT", "/SUPPRESSMSGBOXES", "/NORESTART"
          Write-Host "Inno Setup installed"
      
      - name: Build Inno Setup installer
        shell: pwsh
        run: |
          $ISCC = "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe"
          if (Test-Path $ISCC) {
            & $ISCC "build\installer.iss"
          } else {
            Write-Host "Inno Setup not found at $ISCC"
            # Fallback: just zip the directory
            Compress-Archive -Path "dist\Neshama" -DestinationPath "dist\Neshama-${{ matrix.architecture }}.zip" -Force
          }
      
      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: neshama-windows-${{ matrix.architecture }}
          path: |
            dist/Neshama/**
            dist/Neshama-*.exe
            dist/Neshama-*.zip
          retention-days: 7

  # =============================================
  # Build macOS DMG
  # =============================================
  build-macos:
    name: Build macOS (.dmg)
    runs-on: macos-latest
    strategy:
      matrix:
        architecture: [x64, arm64]
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      
      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/Library/Caches/pip
          key: ${{ runner.os }}-py${{ env.PYTHON_VERSION }}-${{ hashFiles('**/pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-py${{ env.PYTHON_VERSION }}-
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[web]"
          pip install pyinstaller
      
      - name: Build with PyInstaller
        run: |
          python -m PyInstaller --noconfirm --onedir \
            --name "Neshama" \
            --add-data "neshama/web/static:neshama/web/static" \
            --add-data "configs:configs" \
            --add-data "adapters:adapters" \
            --add-data "memory_data:memory_data" \
            --hidden-import=webview \
            --hidden-import=fastapi \
            --hidden-import=uvicorn \
            --hidden-import=pydantic \
            --hidden-import=yaml \
            --osx-bundle-identifier="com.neshama.soul-panel" \
            --icon="build/icons/neshama.icns" \
            neshama/web/launcher.py
      
      - name: Create .app bundle
        run: |
          APP_NAME="Neshama"
          VERSION="${{ env.VERSION || '1.0.0' }}"
          
          # Create bundle structure
          mkdir -p dist/Neshama.app/Contents/{MacOS,Resources,Frameworks}
          
          # Copy files
          cp -R dist/Neshama/* dist/Neshama.app/Contents/MacOS/
          
          # Create Info.plist
          cat > dist/Neshama.app/Contents/Info.plist << 'PLIST'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>CFBundleDisplayName</key><string>Neshama Soul Panel</string>
              <key>CFBundleExecutable</key><string>Neshama</string>
              <key>CFBundleIconFile</key><string>neshama.icns</string>
              <key>CFBundleIdentifier</key><string>com.neshama.soul-panel</string>
              <key>CFBundleName</key><string>Neshama</string>
              <key>CFBundlePackageType</key><string>APPL</string>
              <key>CFBundleShortVersionString</key><string>1.0.0</string>
              <key>CFBundleVersion</key><string>1.0.0</string>
              <key>LSMinimumSystemVersion</key><string>10.15</string>
              <key>NSHighResolutionCapable</key><true/>
              <key>PythonEnvironment</key><string>bundled</string>
          </dict>
          </plist>
          PLIST
          
          # Copy icon
          cp build/icons/neshama.icns dist/Neshama.app/Contents/Resources/
          
          # Make executable
          chmod +x dist/Neshama.app/Contents/MacOS/Neshama
      
      - name: Create DMG
        run: |
          brew install create-dmg || true
          
          APP_NAME="Neshama Soul Panel"
          VERSION="${{ env.VERSION || '1.0.0' }}"
          
          # Create DMG contents directory
          mkdir -p temp_dmg/Neshama
          cp -R dist/Neshama.app temp_dmg/
          ln -sf /Applications temp_dmg/Applications
          
          # Create DMG using create-dmg or hdiutil
          if command -v create-dmg &> /dev/null; then
            create-dmg \
              --volname "$APP_NAME" \
              --window-pos 200 120 \
              --icon-size 100 \
              --icon "Neshama.app" 175 205 \
              --hide-extension "Neshama.app" \
              --app-drop-link 575 205 \
              "dist/Neshama-$VERSION-macOS-${{ matrix.architecture }}.dmg" \
              temp_dmg/
          else
            hdiutil create -volname "$APP_NAME" \
              -srcfolder temp_dmg \
              -ov \
              -format UDZO \
              "dist/Neshama-$VERSION-macOS-${{ matrix.architecture }}.dmg"
          fi
      
      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: neshama-macos-${{ matrix.architecture }}
          path: |
            dist/Neshama.app/**
            dist/Neshama-*.dmg
          retention-days: 7

  # =============================================
  # Build Linux AppImage
  # =============================================
  build-linux:
    name: Build Linux (AppImage)
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      
      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-py${{ env.PYTHON_VERSION }}-${{ hashFiles('**/pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-py${{ env.PYTHON_VERSION }}-
      
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-0 \
            libwebkit2gtk-4.0-dev \
            libayatana-appindicator3-dev \
            patchelf \
            fuse \
            libfuse2
      
      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[web]"
          pip install pyinstaller
      
      - name: Build with PyInstaller
        run: |
          python -m PyInstaller --noconfirm --onedir \
            --name "Neshama" \
            --add-data "neshama/web/static:neshama/web/static" \
            --add-data "configs:configs" \
            --add-data "adapters:adapters" \
            --add-data "memory_data:memory_data" \
            --hidden-import=webview \
            --hidden-import=fastapi \
            --hidden-import=uvicorn \
            --hidden-import=pydantic \
            --hidden-import=yaml \
            neshama/web/launcher.py
      
      - name: Install linuxdeploy
        run: |
          wget -q "https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage"
          chmod +x linuxdeploy-x86_64.AppImage
          wget -q "https://github.com/nicholasnalder/linuxdeploy-plugin-pywebview/releases/download/continuous/linuxdeploy-plugin-pywebview-x86_64.AppImage"
          chmod +x linuxdeploy-plugin-pywebview-x86_64.AppImage
      
      - name: Build AppImage
        run: |
          export VERSION="${{ env.VERSION || '1.0.0' }}"
          
          # Simple AppImage creation without linuxdeploy plugins
          # Copy to AppDir structure
          mkdir -p AppDir/usr/bin
          mkdir -p AppDir/usr/share/applications
          mkdir -p AppDir/usr/share/icons/hicolor/256x256/apps
          
          cp -r dist/Neshama/* AppDir/usr/bin/
          cp build/icons/neshama.png AppDir/usr/share/icons/hicolor/256x256/apps/Neshama.png
          
          # Create desktop file
          cat > AppDir/Neshama.desktop << 'DESKTOP'
          [Desktop Entry]
          Name=Neshama Soul Panel
          Exec=Neshama
          Icon=Neshama
          Type=Application
          Categories=Utility;
          DESKTOP
          
          # For now, just create a zip archive
          # Full AppImage requires additional setup
          tar -czvf "dist/Neshama-$VERSION-linux-x86_64.tar.gz" -C AppDir .
      
      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: neshama-linux-x86_64
          path: dist/Neshama-*.tar.gz
          retention-days: 7

  # =============================================
  # Create GitHub Release
  # =============================================
  release:
    name: Create Release
    needs: [build-windows, build-macos, build-linux]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
      
      - name: Prepare release files
        run: |
          mkdir -p release
          
          # Windows
          cp artifacts/neshama-windows-x64/*.exe release/ 2>/dev/null || true
          cp artifacts/neshama-windows-x64/*.zip release/ 2>/dev/null || true
          
          # macOS
          cp artifacts/neshama-macos-*/Neshama.app.zip release/ 2>/dev/null || true
          cp artifacts/neshama-macos-*/Neshama-*.dmg release/ 2>/dev/null || true
          
          # Linux
          cp artifacts/neshama-linux-x86_64/*.tar.gz release/ 2>/dev/null || true
          
          ls -la release/
      
      - name: Get version from tag
        id: get_version
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "Tag version: $VERSION"
      
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          draft: false
          prerelease: ${{ contains(github.ref, 'alpha') || contains(github.ref, 'beta') || contains(github.ref, 'rc') }}
          generate_release_notes: true
          files: |
            release/*.exe
            release/*.zip
            release/*.dmg
            release/*.tar.gz
            release/*.AppImage
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
