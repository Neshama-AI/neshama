<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neshama - NPC Soul OS</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <div class="app">
        <!-- Sidebar Navigation -->
        <nav class="sidebar">
            <div class="sidebar-header">
                <div class="logo">
                    <svg class="logo-icon" viewBox="0 0 28 28" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <circle cx="14" cy="14" r="12" stroke="currentColor" stroke-width="2"/>
                        <circle cx="14" cy="14" r="5" fill="currentColor" opacity="0.3"/>
                        <circle cx="14" cy="14" r="2" fill="currentColor"/>
                        <path d="M14 2 L14 6 M14 22 L14 26 M2 14 L6 14 M22 14 L26 14" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
                    </svg>
                    <span class="logo-text">Neshama</span>
                </div>
            </div>
            
            <ul class="nav-list">
                <li class="nav-item active" data-page="dashboard">
                    <svg class="nav-icon" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="2" width="7" height="7" rx="1.5"/><rect x="11" y="2" width="7" height="7" rx="1.5"/><rect x="2" y="11" width="7" height="7" rx="1.5"/><rect x="11" y="11" width="7" height="7" rx="1.5"/></svg>
                    <span class="nav-text" data-i18n="nav.dashboard">Dashboard</span>
                </li>
                <li class="nav-item" data-page="account">
                    <svg class="nav-icon" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="10" cy="7" r="4"/><path d="M3 18c0-3.3 3.1-6 7-6s7 2.7 7 6"/></svg>
                    <span class="nav-text" data-i18n="nav.account">Account</span>
                </li>
                <li class="nav-item" data-page="billing">
                    <svg class="nav-icon" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="14" height="12" rx="2"/><path d="M3 8h14"/></svg>
                    <span class="nav-text" data-i18n="nav.billing">Billing</span>
                </li>
                <li class="nav-item" data-page="templates">
                    <svg class="nav-icon" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M4 2h8l6 6v10a2 2 0 01-2 2H4a2 2 0 01-2-2V4a2 2 0 012-2z"/><path d="M12 2v6h6"/></svg>
                    <span class="nav-text" data-i18n="nav.templates">Templates</span>
                </li>
                <li class="nav-item" data-page="debug">
                    <svg class="nav-icon" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="10" cy="10" r="7"/><path d="M10 6v4l3 3"/></svg>
                    <span class="nav-text" data-i18n="nav.debug">Debug</span>
                </li>
                <li class="nav-item" data-page="demo">
                    <svg class="nav-icon" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="4" width="16" height="12" rx="2"/><path d="M8 8l4 2-4 2z"/></svg>
                    <span class="nav-text" data-i18n="nav.demo">Demo</span>
                </li>
                <li class="nav-item" data-page="register">
                    <svg class="nav-icon" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M10 2v6m0 4v6M2 10h6m4 0h6"/><circle cx="10" cy="10" r="2"/></svg>
                    <span class="nav-text" data-i18n="nav.register">Get Started</span>
                </li>
            </ul>
            
            <div class="sidebar-footer">
                <button id="lang-toggle-btn" class="lang-toggle-btn" onclick="toggleLang()">EN</button>
                <div class="connection-status">
                    <span class="status-dot"></span>
                    <span class="status-text">Connected</span>
                </div>
            </div>
        </nav>
        
        <!-- Main Content Area -->
        <main class="main-content">
            <div id="page-dashboard" class="page active">
                <!-- Dashboard content loaded here -->
            </div>
            <div id="page-account" class="page">
                <!-- Account content loaded here -->
            </div>
            <div id="page-billing" class="page">
                <!-- Billing content loaded here -->
            </div>
            <div id="page-templates" class="page">
                <!-- Templates content loaded here -->
            </div>
            <div id="page-debug" class="page">
                <!-- Debug content loaded here -->
            </div>
            <div id="page-demo" class="page">
                <!-- Demo content loaded here -->
            </div>
            <div id="page-register" class="page">
                <!-- Register / Login content loaded here -->
            </div>
            
            <!-- Legal Footer -->
            <footer class="legal-footer">
                <div class="footer-links">
                    <a href="mailto:support@neshama.ai?subject=Privacy" class="footer-link">隐私政策</a>
                    <span class="footer-separator">|</span>
                    <a href="mailto:support@neshama.ai?subject=Terms" class="footer-link">服务条款</a>
                    <span class="footer-separator">|</span>
                    <a href="mailto:support@neshama.ai?subject=Refund" class="footer-link">退款政策</a>
                </div>
                <div class="footer-copyright">
                    © 2026 Neshama AI
                </div>
                <div class="footer-contact">
                    联系邮箱: <a href="mailto:support@neshama.ai">support@neshama.ai</a>
                </div>
            </footer>

    <script src="/static/js/i18n.js"></script>
    <script src="/static/js/theme.js"></script>
    <script src="/static/js/api.js"></script>
    <script src="/static/js/pages/dashboard.js"></script>
    <script src="/static/js/pages/account.js"></script>
    <script src="/static/js/pages/billing.js"></script>
    <script src="/static/js/pages/templates.js"></script>
    <script src="/static/js/pages/debug.js"></script>
    <script src="/static/js/pages/demo.js"></script>
    <script src="/static/js/pages/register.js"></script>
    <script src="/static/js/app.js"></script>
</body>
</html>
